name: Set up bun
description: Set up bun environment and install dependencies

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
      with:
        bun-version-file: .tool-versions

    - name: Bun Install
      shell: bash
      run: bun i --frozen-lockfile --ignore-scripts
